<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Bestellsystem</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 380px;
        }
        h1 { color: #333; margin-bottom: 24px; text-align: center; font-size: 1.8rem; }
        label { display: block; margin-bottom: 6px; color: #555; font-size: 0.95rem; }
        input[type="password"] {
            width: 100%; padding: 12px;
            border: 2px solid #ddd; border-radius: 8px;
            font-size: 1rem; margin-bottom: 16px;
            transition: border-color 0.3s;
        }
        input[type="password"]:focus { outline: none; border-color: #4CAF50; }
        .btn {
            background: #4CAF50; color: white; padding: 13px;
            border: none; border-radius: 8px; cursor: pointer;
            font-size: 1rem; width: 100%; transition: background 0.3s;
        }
        .btn:hover { background: #45a049; }
        .back-link {
            display: block; text-align: center;
            margin-top: 18px; color: #666;
            text-decoration: none; font-size: 0.9rem;
        }
        .back-link:hover { color: #333; }
        .flash {
            background: #ffebee; color: #c62828;
            padding: 12px; border-radius: 8px;
            margin-bottom: 16px; display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔒 Admin Login</h1>
        <div id="flash" class="flash"></div>
        <label for="pass">Passwort:</label>
        <input type="password" id="pass" autofocus>
        <button class="btn" onclick="doLogin()">Einloggen</button>
        <a href="index.html" class="back-link">← Zurück zur Bestellseite</a>
    </div>

    <script>
        // If already logged in, redirect
        if (localStorage.getItem('pbs_admin_auth') === '1') {
            window.location.href = 'admin.html';
        }

        document.getElementById('pass').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });

        function doLogin() {
            const entered = document.getElementById('pass').value;
            const stored  = localStorage.getItem('pbs_admin_pass') || 'admin';
            if (entered === stored) {
                localStorage.setItem('pbs_admin_auth', '1');
                window.location.href = 'admin.html';
            } else {
                const el = document.getElementById('flash');
                el.textContent = 'Falsches Passwort';
                el.style.display = 'block';
                document.getElementById('pass').value = '';
                document.getElementById('pass').focus();
            }
        }
    </script>
</body>
</html>
