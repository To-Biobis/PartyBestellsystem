<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestellsystem – Tisch auswählen</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 30px; font-size: 2rem; }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.2rem;
            text-align: center;
            transition: border-color 0.3s;
            margin-bottom: 15px;
        }
        input[type="text"]:focus { outline: none; border-color: #4CAF50; }
        .btn {
            background: #4CAF50;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            width: 100%;
            transition: background 0.3s;
        }
        .btn:hover { background: #45a049; }
        .admin-link {
            margin-top: 20px;
            display: block;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .admin-link:hover { color: #333; }
        .flash {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        @media (max-width: 480px) {
            .card { padding: 20px; }
            h1 { font-size: 1.5rem; }
            input[type="text"], .btn { font-size: 1rem; padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 Bestellsystem</h1>
        <div id="flash" class="flash"></div>
        <input type="text" id="tableInput" placeholder="Tischnummer eingeben"
               autofocus inputmode="numeric" pattern="[0-9]*">
        <button class="btn" onclick="setTable()">Bestellen →</button>
        <a href="admin-login.html" class="admin-link">Admin-Bereich</a>
    </div>

    <script>
        // Pre-fill last used table
        const saved = localStorage.getItem('pbs_table');
        if (saved) document.getElementById('tableInput').value = saved;

        document.getElementById('tableInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') setTable();
        });

        function setTable() {
            const v = document.getElementById('tableInput').value.trim();
            if (!v) { showFlash('Bitte Tischnummer eingeben'); return; }
            localStorage.setItem('pbs_table', v);
            window.location.href = 'order.html';
        }

        function showFlash(msg) {
            const el = document.getElementById('flash');
            el.textContent = msg;
            el.style.display = 'block';
        }

        // Default fallback data (used when JSON fetch fails)
        const DEFAULT_CATEGORIES = [
            {"id":1,"name":"Essen"},
            {"id":2,"name":"Trinken"}
        ];
        const DEFAULT_PRODUCTS = [
            {"id":3,"name":"Schweinebraten","kategorie":1,"price":12.5},
            {"id":4,"name":"Schupfnudeln","kategorie":1,"price":6.5},
            {"id":5,"name":"Bockwurst","kategorie":1,"price":6.0},
            {"id":6,"name":"Pommes","kategorie":1,"price":3.0},
            {"id":7,"name":"Steak","kategorie":1,"price":7.0},
            {"id":16,"name":"Bockwurst im Semmel","kategorie":1,"price":4.5},
            {"id":17,"name":"Steaksemmel","kategorie":1,"price":5.5},
            {"id":8,"name":"500ml Radler","kategorie":2,"price":3.0},
            {"id":9,"name":"Limo Gelb","kategorie":2,"price":2.5},
            {"id":10,"name":"Limo Weiß","kategorie":2,"price":2.5},
            {"id":11,"name":"1l Bier","kategorie":2,"price":6.0},
            {"id":12,"name":"1l Radler","kategorie":2,"price":6.0},
            {"id":13,"name":"500ml Gaiß","kategorie":2,"price":4.0},
            {"id":14,"name":"Maß Gaiß","kategorie":2,"price":8.0},
            {"id":15,"name":"Glas Wein (rose)","kategorie":2,"price":3.0},
            {"id":18,"name":"500ml Bier","kategorie":2,"price":3.5}
        ];

        // Initialize app data on first visit
        (async function init() {
            if (!localStorage.getItem('pbs_categories')) {
                try {
                    const r = await fetch('data/categories.json');
                    localStorage.setItem('pbs_categories', JSON.stringify(await r.json()));
                } catch {
                    localStorage.setItem('pbs_categories', JSON.stringify(DEFAULT_CATEGORIES));
                }
            }
            if (!localStorage.getItem('pbs_products')) {
                try {
                    const r = await fetch('data/products.json');
                    const all = await r.json();
                    // Filter out placeholder items with price 0
                    const real = all.filter(p => p.price > 0);
                    localStorage.setItem('pbs_products', JSON.stringify(real));
                } catch {
                    localStorage.setItem('pbs_products', JSON.stringify(DEFAULT_PRODUCTS));
                }
            }
            if (!localStorage.getItem('pbs_orders')) {
                localStorage.setItem('pbs_orders', JSON.stringify([]));
            }
            if (!localStorage.getItem('pbs_next_id')) {
                localStorage.setItem('pbs_next_id', '1');
            }
            if (!localStorage.getItem('pbs_admin_pass')) {
                localStorage.setItem('pbs_admin_pass', 'admin');
            }
        })();
    </script>
</body>
</html>
