<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bon drucken</title>
    <style>
        /* ── Screen layout ── */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        /* --- Action buttons (hidden when printing) --- */
        .print-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            color: white;
        }

        .btn-print  { background: #4CAF50; }
        .btn-print:hover  { background: #388E3C; }
        .btn-back   { background: #2196F3; }
        .btn-back:hover   { background: #1565C0; }

        /* --- Receipt card --- */
        .receipt-wrapper {
            background: white;
            width: 300px;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
        }

        .receipt-header {
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 10px;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
        }

        .receipt-table-info {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            margin: 8px 0;
        }

        .receipt-item {
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
        }

        .receipt-item-name { flex: 1; }

        .receipt-item-price {
            white-space: nowrap;
            margin-left: 8px;
        }

        .receipt-comment {
            font-size: 0.85em;
            color: #555;
            margin-left: 12px;
            font-style: italic;
        }

        hr.separator {
            border: none;
            border-top: 1px solid #333;
            margin: 10px 0;
        }

        .receipt-total {
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 1.1em;
        }

        .receipt-footer {
            text-align: center;
            margin-top: 12px;
            font-size: 0.85em;
            color: #555;
            border-top: 1px dashed #555;
            padding-top: 8px;
        }

        .receipt-timestamp {
            text-align: center;
            font-size: 0.8em;
            color: #777;
            margin-top: 6px;
        }

        .no-data {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        /* ── Print styles ── */
        @media print {
            body { background: none; padding: 0; }

            .receipt-wrapper {
                box-shadow: none;
                width: 100%;
                max-width: 72mm;
                padding: 4px;
                border-radius: 0;
            }

            .print-actions { display: none; }

            @page { margin: 5mm; size: 80mm auto; }
        }
    </style>
</head>
<body>

    <div class="print-actions">
        <button class="btn btn-print" onclick="window.print()">🖨️ Drucken</button>
        <button class="btn btn-back" onclick="history.back()">← Zurück</button>
    </div>

    <div class="receipt-wrapper" id="receipt">
        <div class="receipt-header">Bestellbon</div>
        <div class="receipt-table-info" id="tableInfo">Tisch –</div>

        <hr class="separator">

        <div id="receiptItems">
            <div class="no-data">Keine Bestelldaten gefunden.<br>Bitte zuerst eine Bestellung aufgeben.</div>
        </div>

        <hr class="separator">

        <div class="receipt-total">
            <span>Gesamt</span>
            <span id="receiptTotal">0,00 €</span>
        </div>

        <div class="receipt-timestamp" id="receiptTimestamp"></div>
        <div class="receipt-footer">Vielen Dank!</div>
    </div>

    <script>
        // Safely escape untrusted strings before injecting into innerHTML.
        function escHtml(str) {
            var d = document.createElement('div');
            d.appendChild(document.createTextNode(str));
            return d.innerHTML;
        }

        (function () {
            'use strict';

            function fmt(num) {
                return num.toFixed(2).replace('.', ',') + ' €';
            }

            var raw = null;
            try { raw = localStorage.getItem('bon_data'); } catch (e) {}

            if (!raw) return; // leave the "no data" message

            var data;
            try { data = JSON.parse(raw); } catch (e) { return; }

            // Table info
            if (data.tisch) {
                document.getElementById('tableInfo').textContent = 'Tisch ' + data.tisch;
            }

            // Timestamp
            if (data.zeitpunkt) {
                document.getElementById('receiptTimestamp').textContent =
                    'Gedruckt: ' + data.zeitpunkt;
            }

            // Items
            var items = data.items || [];
            if (items.length === 0) return;

            var container = document.getElementById('receiptItems');
            container.innerHTML = '';

            var total = 0;
            items.forEach(function (item) {
                var price  = parseFloat(item.price)  || 0;
                var menge  = parseInt(item.menge, 10) || 1;
                var subtotal = price * menge;
                total += subtotal;

                // Row: "2× Pizza Margherita  17,00 €"
                var row = document.createElement('div');
                row.className = 'receipt-item';
                row.innerHTML =
                    '<span class="receipt-item-name">' + menge + '× ' + escHtml(item.name) + '</span>' +
                    '<span class="receipt-item-price">' + fmt(subtotal) + '</span>';
                container.appendChild(row);

                // Optional comment
                if (item.kommentar) {
                    var cmt = document.createElement('div');
                    cmt.className = 'receipt-comment';
                    cmt.textContent = '↳ ' + item.kommentar;
                    container.appendChild(cmt);
                }
            });

            document.getElementById('receiptTotal').textContent = fmt(total);
        }());

        // Auto-open print dialog so the Android Print Service pops up immediately.
        // A short delay ensures the DOM has fully rendered before the dialog opens.
        var PRINT_DELAY_MS = 400;
        window.addEventListener('load', function () {
            var raw = null;
            try { raw = localStorage.getItem('bon_data'); } catch (e) {}
            if (raw) {
                setTimeout(function () { window.print(); }, PRINT_DELAY_MS);
            }
        });
    </script>

</body>
</html>
